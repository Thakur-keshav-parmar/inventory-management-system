  # ── LAMBDA: SEND WHATSAPP E-BILL ────────────────────────────────────────────
  SendWhatsAppFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: HardwarePro-SendWhatsApp
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          TWILIO_SID:   !Ref TwilioAccountSid
          TWILIO_TOKEN: !Ref TwilioAuthToken
          TWILIO_FROM:  !Ref TwilioWhatsAppFrom
      Code:
        ZipFile: |
          const https=require('https');
          const CORS={'Access-Control-Allow-Origin':'*','Access-Control-Allow-Headers':'Content-Type','Access-Control-Allow-Methods':'POST,OPTIONS','Content-Type':'application/json'};
          exports.handler=async(event)=>{
            if(event.httpMethod==='OPTIONS')return{statusCode:200,headers:CORS,body:''};
            try{
              const{phone,message}=JSON.parse(event.body||'{}');
              if(!phone||!message)return{statusCode:400,headers:CORS,body:JSON.stringify({success:false,error:'phone and message required'})};
              let e164=phone.replace(/\D/g,'');
              if(e164.length===10)e164='91'+e164;
              if(!e164.startsWith('+'))e164='+'+e164;
              const SID=process.env.TWILIO_SID,TOKEN=process.env.TWILIO_TOKEN,FROM=process.env.TWILIO_FROM;
              const pd=new URLSearchParams({To:'whatsapp:'+e164,From:FROM,Body:message}).toString();
              const creds=Buffer.from(SID+':'+TOKEN).toString('base64');
              const r=await new Promise((res,rej)=>{
                const req=https.request({hostname:'api.twilio.com',path:`/2010-04-01/Accounts/${SID}/Messages.json`,method:'POST',
                  headers:{'Content-Type':'application/x-www-form-urlencoded','Authorization':'Basic '+creds,'Content-Length':Buffer.byteLength(pd)}},(resp)=>{
                  let d='';resp.on('data',c=>d+=c);resp.on('end',()=>res({status:resp.statusCode,body:d}));
                });
                req.on('error',rej);req.write(pd);req.end();
              });
              const tr=JSON.parse(r.body);
              if(r.status===201)return{statusCode:200,headers:CORS,body:JSON.stringify({success:true,sid:tr.sid})};
              return{statusCode:502,headers:CORS,body:JSON.stringify({success:false,error:tr.message||'Twilio error'})};
            }catch(e){return{statusCode:500,headers:CORS,body:JSON.stringify({success:false,error:e.message})};}
          };

