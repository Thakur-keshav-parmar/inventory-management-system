AWSTemplateFormatVersion: '2010-09-09'
Description: 'HardwarePro POS - Complete AWS Infrastructure (Free Tier)'

Parameters:
  RazorpayKeyId:
    Type: String
    Default: 'rzp_test_SLrxDpCa8ctwrN'
    Description: 'Razorpay Test Key ID'
  RazorpayKeySecret:
    Type: String
    NoEcho: true
    Description: 'Razorpay Test Key Secret (kept server-side only)'
  TwilioAccountSid:
    Type: String
    Default: 'ACXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX'
    Description: 'Twilio Account SID (for WhatsApp e-bill)'
  TwilioAuthToken:
    Type: String
    NoEcho: true
    Default: 'your_twilio_auth_token'
    Description: 'Twilio Auth Token'
  TwilioWhatsAppFrom:
    Type: String
    Default: 'whatsapp:+14155238886'
    Description: 'Twilio WhatsApp sender number (sandbox: whatsapp:+14155238886)'

Resources:

  # ????????? DYNAMODB TABLE ?????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????
  TransactionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: HardwareProTransactions
      BillingMode: PAY_PER_REQUEST        # Free tier: 25 GB, 25 WCU/RCU free
      AttributeDefinitions:
        - AttributeName: transactionId
          AttributeType: S
      KeySchema:
        - AttributeName: transactionId
          KeyType: HASH

  # ????????? IAM ROLE (Least Privilege) ?????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: HardwarePro-Lambda-Role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBLeastPrivilege
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                Resource: !GetAtt TransactionsTable.Arn

  # ????????? LAMBDA: CREATE ORDER ???????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????
  CreateOrderFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: HardwarePro-CreateOrder
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          KEY_ID: !Ref RazorpayKeyId
          KEY_SECRET: !Ref RazorpayKeySecret
      Code:
        ZipFile: |
          const https=require('https');
          exports.handler=async(event)=>{
            const h={'Access-Control-Allow-Origin':'*','Access-Control-Allow-Headers':'Content-Type','Access-Control-Allow-Methods':'POST,OPTIONS','Content-Type':'application/json'};
            if(event.httpMethod==='OPTIONS')return{statusCode:200,headers:h,body:''};
            try{
              const b=JSON.parse(event.body||'{}');
              const paise=Math.round((b.amount||0)*100);
              const creds=Buffer.from(process.env.KEY_ID+':'+process.env.KEY_SECRET).toString('base64');
              const pd=JSON.stringify({amount:paise,currency:'INR',receipt:b.receipt||'r'+Date.now()});
              const order=await new Promise((res,rej)=>{
                const req=https.request({hostname:'api.razorpay.com',path:'/v1/orders',method:'POST',
                  headers:{'Content-Type':'application/json','Authorization':'Basic '+creds,'Content-Length':Buffer.byteLength(pd)}},(r)=>{
                  let d='';r.on('data',c=>d+=c);r.on('end',()=>res(JSON.parse(d)));
                });
                req.on('error',rej);req.write(pd);req.end();
              });
              return{statusCode:200,headers:h,body:JSON.stringify({orderId:order.id,amount:order.amount,currency:order.currency})};
            }catch(e){return{statusCode:500,headers:h,body:JSON.stringify({error:e.message})};}
          };

  # ????????? LAMBDA: CONFIRM PAYMENT ??????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????
  ConfirmPaymentFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: HardwarePro-ConfirmPayment
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          KEY_SECRET: !Ref RazorpayKeySecret
          TABLE_NAME: !Ref TransactionsTable
      Code:
        ZipFile: |
          const crypto=require('crypto');
          const {DynamoDBClient,PutItemCommand}=require('@aws-sdk/client-dynamodb');
          const db=new DynamoDBClient({});
          exports.handler=async(event)=>{
            const h={'Access-Control-Allow-Origin':'*','Access-Control-Allow-Headers':'Content-Type','Access-Control-Allow-Methods':'POST,OPTIONS','Content-Type':'application/json'};
            if(event.httpMethod==='OPTIONS')return{statusCode:200,headers:h,body:''};
            try{
              const b=JSON.parse(event.body||'{}');
              const sig=crypto.createHmac('sha256',process.env.KEY_SECRET).update(b.razorpay_order_id+'|'+b.razorpay_payment_id).digest('hex');
              if(sig!==b.razorpay_signature)return{statusCode:400,headers:h,body:JSON.stringify({success:false,error:'Invalid signature'})};
              await db.send(new PutItemCommand({TableName:process.env.TABLE_NAME,Item:{
                transactionId:{S:b.transactionId||'tx'+Date.now()},
                userId:{S:b.userId||'guest'},
                amount:{N:String(b.amount||0)},
                status:{S:'captured'},
                timestamp:{S:new Date().toISOString()},
                razorpayOrderId:{S:b.razorpay_order_id},
                razorpayPaymentId:{S:b.razorpay_payment_id}
              }}));
              return{statusCode:200,headers:h,body:JSON.stringify({success:true,transactionId:b.transactionId,paymentId:b.razorpay_payment_id})};
            }catch(e){return{statusCode:500,headers:h,body:JSON.stringify({success:false,error:e.message})};}
          };

  # ????????? API GATEWAY ??????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????
  HardwareProApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: HardwarePro-API
      Description: HardwarePro Payment API

  CreateOrderResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref HardwareProApi
      ParentId: !GetAtt HardwareProApi.RootResourceId
      PathPart: create-order

  CreateOrderPost:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref HardwareProApi
      ResourceId: !Ref CreateOrderResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CreateOrderFunction.Arn}/invocations'

  CreateOrderOptions:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref HardwareProApi
      ResourceId: !Ref CreateOrderResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode":200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  ConfirmPaymentResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref HardwareProApi
      ParentId: !GetAtt HardwareProApi.RootResourceId
      PathPart: confirm-payment

  ConfirmPaymentPost:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref HardwareProApi
      ResourceId: !Ref ConfirmPaymentResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ConfirmPaymentFunction.Arn}/invocations'

  ConfirmPaymentOptions:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref HardwareProApi
      ResourceId: !Ref ConfirmPaymentResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode":200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  CreateOrderPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CreateOrderFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HardwareProApi}/*/POST/create-order'

  ConfirmPaymentPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ConfirmPaymentFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HardwareProApi}/*/POST/confirm-payment'

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - CreateOrderPost
      - CreateOrderOptions
      - ConfirmPaymentPost
      - ConfirmPaymentOptions
    Properties:
      RestApiId: !Ref HardwareProApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref HardwareProApi
      DeploymentId: !Ref ApiDeploymentV2
      StageName: prod

  # ????????? S3 BUCKET (Static Website Hosting) ??????????????????????????????????????????????????????????????????????????????????????????????????????????????????
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'hardwarepro-frontend-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'

  # ????????? CLOUDFRONT DISTRIBUTION ??????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn: FrontendBucket
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Comment: HardwarePro Frontend
        PriceClass: PriceClass_100
        Origins:
          - Id: S3WebsiteOrigin
            DomainName: !Select
              - 1
              - !Split ['://', !GetAtt FrontendBucket.WebsiteURL]
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          TargetOriginId: S3WebsiteOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          AllowedMethods: [GET, HEAD]
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

# ????????? OUTPUTS ??????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????

  # ????????? DYNAMODB: NEW TABLES ???????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????
